<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>未来設計ワーク</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#f7f3f1;
  color:#4a342e;
}

.top{
  height:90px;
  background:url("background.jpg") center/cover;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.title{
  text-align:center;
  font-size:26px;
  font-weight:bold;
  margin-top:20px;
}

.sub{
  text-align:center;
  color:#777;
  margin-bottom:20px;
}

.card{
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

button{
  width:100%;
  padding:16px;
  border:none;
  border-radius:30px;
  background:#f56c86;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  margin-top:20px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}
</style>
</head>

<body>

<div class="top"></div>

<div class="container">

<!-- 表紙 -->
<div id="startArea">

<div class="title">未来設計ワーク</div>

<div class="sub">
頭の中にある理想を<br>
言葉にして整えていきましょう
</div>

<div class="card">
書くだけで、今の気持ちや理想が見えやすくなります。<br>
焦らなくて大丈夫です。<br>
ひとつずつ進めていきましょう。
</div>

<div style="text-align:center; margin:24px 0 10px;">
  <img src="character1.jpg" style="width:280px; max-width:65%;">
</div>

<button onclick="startWork()">ワークを始める</button>

</div>

<!-- 入力 -->
<div id="workArea" style="display:none;">

<div class="card">
お金
<input id="money" placeholder="例：100万円">

期限
<input id="deadline" placeholder="例：1年後">

目的
<textarea id="purpose" placeholder="例：生活を整えるため・自由な時間を増やすため"></textarea>
</div>

<div class="card">
理想の生活
<textarea id="ideal">・時間に余裕のある生活をしている
・好きなことに集中できる毎日を送っている
・お金に対する不安がない状態で過ごしている
・なぜか私はうまくいく気がする</textarea>
</div>

<div class="card">
やりたくないこと
<textarea id="hate">・掃除
・洗濯
・食器洗い
・食事づくり</textarea>
</div>

<div class="card">
解決方法
<textarea id="solve">・やり方を変える
・人に任せる
・回数を減らす
・お金を使う方法も考える</textarea>
</div>

<div class="card">
未来
<textarea id="future">・孫にお金の心配なく好きなものを買ってあげている
・行きたい国へお金を気にせず旅行している
・ジムに通い健康的な体で過ごしている</textarea>
</div>

<button onclick="finishWork()">完了する</button>

</div>

<!-- 最後 -->
<div id="finalArea" style="display:none;">

<p id="todayDate" style="text-align:center;color:#999;"></p>

<div class="card">

<div id="r_moneyBlock"></div>
<div id="r_ideal"></div>
<div id="r_hate"></div>
<div id="r_solve"></div>
<div id="r_future"></div>

</div>

<div class="card">
入力内容は保存されません<br>
スクリーンショットをおすすめします
</div>

<div style="display:flex; justify-content:space-between; align-items:flex-end; margin-top:20px;">

<div style="background:#fff; padding:12px; border-radius:15px;">
ここまでできましたね<br>
ここからがスタートです
</div>

<img src="character2.jpg" style="width:260px; max-width:45%;">

</div>

<button onclick="restartWork()">もう一度ワークをする</button>

</div>

</div>

<script>

function startWork(){
document.getElementById("startArea").style.display="none";
document.getElementById("workArea").style.display="block";
}

function finishWork(){

const money=document.getElementById("money").value;
const deadline=document.getElementById("deadline").value;
const purpose=document.getElementById("purpose").value;
const ideal=document.getElementById("ideal").value;
const hate=document.getElementById("hate").value;
const solve=document.getElementById("solve").value;
const future=document.getElementById("future").value;

document.getElementById("r_moneyBlock").innerText=
"必要金額："+money+"\n期限："+deadline+"\n目的："+purpose;

document.getElementById("r_ideal").innerText=ideal;
document.getElementById("r_hate").innerText=hate;
document.getElementById("r_solve").innerText=solve;
document.getElementById("r_future").innerText=future;

document.getElementById("workArea").style.display="none";
document.getElementById("finalArea").style.display="block";

const today=new Date();
document.getElementById("todayDate").innerText=
today.getFullYear()+"年"+(today.getMonth()+1)+"月"+today.getDate()+"日";

}

function restartWork(){
document.getElementById("finalArea").style.display="none";
document.getElementById("startArea").style.display="block";
}

</script>

</body>
</html>
